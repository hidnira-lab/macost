services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- -H 0.0.0.0
    # Required: `next dev`'s CLI wrapper forks the real dev-server process with
    # stdio: 'inherit'. Without an allocated pseudo-TTY and open stdin, that
    # forked child can exit cleanly right after "Ready", and the wrapper
    # silently mirrors that as a plain `process.exit(0)` — no error printed,
    # container just stops. See .planning/debug/resolved/docker-frontend-exits-code-0.md
    stdin_open: true
    tty: true
